global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alloy pushes via remote_write — no scrape targets needed for payload-manager.
# Add scrape targets here for any other services you want to pull from directly.
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]
