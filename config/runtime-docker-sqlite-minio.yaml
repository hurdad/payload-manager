server:
  bind_address: "0.0.0.0:50051"

database:
  sqlite:
    path: "/var/lib/payload-manager/payload-manager.db"
    wal_mode: true

storage:
  ram:
    capacity_bytes: 8589934592  # 8 GiB
    use_hugepages: false
    shm_prefix: "pm"
  disk:
    root_path: "/var/lib/payload-manager/payloads"
    capacity_bytes: 107374182400  # 100 GiB
    fsync: true
  object:
    root_path: "s3://payloads"
    filesystem: FILE_SYSTEM_S3
    compression: COMPRESSION_UNCOMPRESSED
    filesystem_options:
      s3:
        endpoint_override: "minio:9000"
        scheme: "http"
        credentials_kind: S3_CREDENTIALS_KIND_DEFAULT
        tls_verify_certificates: false
        allow_delayed_open: false
        background_writes: false
        allow_bucket_creation: true

spill_workers:
  threads: 4
  retry_backoff: "1s"

leases:
  default_lease: "20s"
  max_lease: "120s"

logging:
  level: "info"
  pattern: "%+"
  include_trace_context: false

observability:
  metrics_enabled: false
  tracing_enabled: false
  logs_enabled: false
