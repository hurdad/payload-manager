syntax = "proto3";
package payload.manager.runtime.v1;

import "payload/manager/core/v1/placement.proto";
import "payload/manager/core/v1/id.proto";
import "payload/manager/core/v1/types.proto";
import "payload/manager/core/v1/policy.proto";

/*
  Allocate reserves placement but payload is not visible
  until CommitPayload succeeds.
*/
message AllocatePayloadRequest {
  uint64 size_bytes = 1;
  payload.manager.core.v1.Tier preferred_tier = 2;
  uint64 ttl_ms = 3;
  bool no_evict = 4;
  payload.manager.core.v1.EvictionPolicy eviction_policy = 5;
}

message AllocatePayloadResponse {
  payload.manager.core.v1.PayloadDescriptor payload_descriptor = 1;
}

message CommitPayloadRequest {
  payload.manager.core.v1.PayloadID id = 1;
}

message CommitPayloadResponse {
  payload.manager.core.v1.PayloadDescriptor payload_descriptor = 1;
}

/*
  force=true invalidates all active leases immediately.
*/
message DeleteRequest {
  payload.manager.core.v1.PayloadID id = 1;
  bool force = 2;
}

// Summary row returned by ListPayloads.
message PayloadSummary {
  payload.manager.core.v1.PayloadID  id             = 1;
  payload.manager.core.v1.Tier       tier           = 2;
  payload.manager.core.v1.PayloadState state        = 3;
  uint64                              size_bytes     = 4;
  uint64                              created_at_ms  = 5; // 0 = unknown (legacy row)
  uint64                              expires_at_ms  = 6; // 0 = no expiration
  uint32                              active_leases  = 7;
}

message ListPayloadsRequest {
  // Optional tier filter; TIER_UNSPECIFIED means return all tiers.
  payload.manager.core.v1.Tier tier_filter = 1;
  // Maximum number of payloads to return. 0 = server default (50); max 500.
  int32 page_size = 2;
  // Opaque cursor from a previous ListPayloadsResponse.next_page_token.
  // Omit or leave empty to start from the beginning.
  string page_token = 3;
}

message ListPayloadsResponse {
  repeated PayloadSummary payloads = 1;
  // Opaque cursor for the next page. Empty when this is the last page.
  string next_page_token = 2;
  // Total number of payloads matching the filter (ignoring pagination).
  int32 total_count = 3;
}
