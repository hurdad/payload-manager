# Overlay this on top of docker-compose.yml to add the full observability stack:
#
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up
#
# Provides:
#   - Grafana Alloy  — OTLP receiver (gRPC :4317, HTTP :4318)
#   - Prometheus     — metric storage with remote_write enabled
#   - Grafana        — dashboards at http://localhost:3000  (admin/admin)
#   - Tempo          — trace backend (used when tracing_enabled=true)

services:
  alloy:
    image: grafana/alloy:v1.5.1
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=generally-available
    ports:
      - "4317:4317"   # OTLP gRPC
      - "12345:12345" # Alloy UI
    volumes:
      - ./grafana/alloy/config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"
    volumes:
      - ./grafana/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  tempo:
    image: grafana/tempo:2.4.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"  # Tempo UI / query
      - "4327:4317"  # OTLP gRPC (offset to avoid collision with alloy)
    volumes:
      - ./grafana/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:
