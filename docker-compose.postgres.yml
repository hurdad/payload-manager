services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: payload_manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  payload-manager:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    hostname: payload-manager
    depends_on:
      postgres:
        condition: service_healthy
    command: ["./payload-manager", "--config", "/app/conf/runtime-docker-no-otel-postgres.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50051'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ipc: host
    ports:
      - "50051:50051"
    volumes:
      - ./config/runtime-docker-no-otel-postgres.yaml:/app/conf/runtime-docker-no-otel-postgres.yaml:ro
      - payload-data:/var/lib/payload-manager

volumes:
  postgres-data:
  payload-data:
