# Overlay this on any base compose file to run the integration API test
# inside Docker against the running payload-manager service.
#
# Usage:
#   docker compose -f docker/docker-compose.sqlite.yml      -f docker/docker-compose.test.yml up --build --exit-code-from integration-test
#   docker compose -f docker/docker-compose.postgres.yml    -f docker/docker-compose.test.yml up --build --exit-code-from integration-test
#   docker compose -f docker/docker-compose.otel.sqlite.yml -f docker/docker-compose.test.yml up --build --exit-code-from integration-test
#   docker compose -f docker/docker-compose.otel.postgres.yml -f docker/docker-compose.test.yml up --build --exit-code-from integration-test
#
# The test container:
#   - waits for payload-manager to pass its healthcheck (service_healthy)
#   - uses ipc: host (same shm namespace for Arrow IPC buffers)
#   - connects via Docker network using the service hostname

services:
  integration-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
      shm_size: '256m'
    depends_on:
      payload-manager:
        condition: service_healthy
    ipc: host
    environment:
      PAYLOAD_MANAGER_ENDPOINT: "payload-manager:50051"
      OTLP_ENDPOINT: ""
    restart: "no"
