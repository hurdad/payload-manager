services:
  payload-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    hostname: payload-manager
    command: ["./payload-manager", "--config", "/app/conf/runtime-docker-no-otel-sqlite.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50051'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ipc: host
    volumes:
      - ../config/runtime-docker-no-otel-sqlite.yaml:/app/conf/runtime-docker-no-otel-sqlite.yaml:ro
      - payload-gateway-data:/var/lib/payload-manager

  payload-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    depends_on:
      payload-manager:
        condition: service_healthy
    environment:
      GRPC_ADDR: payload-manager:50051
      HTTP_ADDR: :8080
      DISK_ROOT_PATH: /var/lib/payload-manager/payloads
    ports:
      - "8080:8080"
    volumes:
      - payload-gateway-data:/var/lib/payload-manager:ro

volumes:
  payload-gateway-data:
