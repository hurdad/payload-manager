# Object-spill integration test overlay.
#
# Layers on top of a base compose file and docker-compose.minio.yml.
# Runs the object_spill_integration_test against a live payload-manager
# that has MinIO object storage configured.
#
# Usage:
#   docker compose \
#     -f docker/docker-compose.sqlite.yml \
#     -f docker/docker-compose.minio.yml \
#     -f docker/docker-compose.minio.test.yml \
#     up --build --exit-code-from object-spill-test

services:
  object-spill-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test.minio
      shm_size: '256m'
    depends_on:
      payload-manager:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ipc: host
    environment:
      PAYLOAD_MANAGER_ENDPOINT: "payload-manager:50051"
      OTLP_ENDPOINT: ""
      MINIO_ENDPOINT: "minio:9000"
      MINIO_BUCKET: "payloads"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    restart: "no"
