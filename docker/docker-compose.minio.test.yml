# Object-spill integration test overlay.
#
# Layers on top of docker-compose.sqlite.yml + docker-compose.minio.yml.
# Runs the object_spill_integration_test against a live payload-manager that
# has MinIO object storage configured.
#
# payload-manager uses allow_bucket_creation: true so it creates the 'payloads'
# bucket on first use — no minio-init one-shot container is needed.  This
# avoids the --abort-on-container-exit race that fired when minio-init exited
# with 0 while the Spill RPC was in flight.
#
# Usage:
#   docker compose \
#     -f docker/docker-compose.sqlite.yml \
#     -f docker/docker-compose.minio.yml \
#     -f docker/docker-compose.minio.test.yml \
#     up --build --exit-code-from object-spill-test

services:
  payload-manager:
    depends_on:
      minio:
        condition: service_healthy
    command:
      ["./payload-manager", "--config", "/app/conf/runtime-docker-sqlite-minio.yaml"]
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ../config/runtime-docker-sqlite-minio.yaml:/app/conf/runtime-docker-sqlite-minio.yaml:ro

  object-spill-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test.minio
      shm_size: '256m'
    depends_on:
      payload-manager:
        condition: service_healthy
      minio:
        condition: service_healthy
    ipc: host
    environment:
      PAYLOAD_MANAGER_ENDPOINT: "payload-manager:50051"
      OTLP_ENDPOINT: ""
      MINIO_ENDPOINT: "minio:9000"
      MINIO_BUCKET: "payloads"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    restart: "no"
