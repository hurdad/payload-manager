services:
  payload-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    restart: unless-stopped
    hostname: payload-manager
    command: ["./payload-manager", "--config", "/app/conf/runtime-docker-gpu-sqlite.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50051'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ipc: host
    # Required for cross-container CUDA IPC: cuIpcOpenMemHandle resolves the
    # exporting process's PID via procfs; without a shared PID namespace the
    # driver returns CUDA_ERROR_INVALID_CONTEXT even when ipc: host is set.
    pid: host
    volumes:
      - ../config/runtime-docker-gpu-sqlite.yaml:/app/conf/runtime-docker-gpu-sqlite.yaml:ro
      - e2e-cuda-data:/var/lib/payload-manager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  payload-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    depends_on:
      payload-manager:
        condition: service_healthy
    environment:
      GRPC_ADDR: payload-manager:50051
      HTTP_ADDR: :8080
      DISK_ROOT_PATH: /var/lib/payload-manager/payloads
    ports:
      - "8080:8080"
    volumes:
      - e2e-cuda-data:/var/lib/payload-manager:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  e2e:
    build:
      context: ..
      dockerfile: docker/Dockerfile.e2e
    depends_on:
      - payload-gateway
    environment:
      BASE_URL: http://payload-gateway:8080
    command: >
      sh -c "
        echo 'Waiting for gateway...';
        until wget -qO- http://payload-gateway:8080/v1/payloads > /dev/null 2>&1; do
          sleep 2;
        done;
        echo 'Gateway ready, running tests...';
        npx playwright test --reporter=list
      "
    volumes:
      - ../ui/test-results:/app/test-results
      - ../ui/playwright-report:/app/playwright-report

volumes:
  e2e-cuda-data:
