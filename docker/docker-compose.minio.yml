# MinIO object storage overlay.
#
# Adds a MinIO S3-compatible service.  Layer this on top of any base compose
# file.  To also create the 'payloads' bucket via a one-shot init container,
# add docker-compose.minio.init.yml.  For integration tests (where
# payload-manager creates the bucket itself via allow_bucket_creation), add
# docker-compose.minio.test.yml instead.
#
# Usage (interactive / development stack with bucket pre-creation):
#   docker compose \
#     -f docker/docker-compose.sqlite.yml \
#     -f docker/docker-compose.minio.yml \
#     -f docker/docker-compose.minio.init.yml \
#     up --build
#
# MinIO console: http://localhost:9001  (minioadmin / minioadmin)
# S3 endpoint:   http://localhost:9000

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  minio-data:
