# MinIO object storage overlay.
#
# Adds a MinIO S3-compatible service, creates the 'payloads' bucket, and
# reconfigures payload-manager to spill to object storage.
#
# Usage (layer on top of any base compose file):
#   docker compose \
#     -f docker/docker-compose.sqlite.yml \
#     -f docker/docker-compose.minio.yml \
#     up --build
#
# MinIO console: http://localhost:9001  (minioadmin / minioadmin)
# S3 endpoint:   http://localhost:9000

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/payloads
      "
    restart: "no"

  payload-manager:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command:
      ["./payload-manager", "--config", "/app/conf/runtime-docker-no-otel-sqlite-minio.yaml"]
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ../config/runtime-docker-no-otel-sqlite-minio.yaml:/app/conf/runtime-docker-no-otel-sqlite-minio.yaml:ro

volumes:
  minio-data:
