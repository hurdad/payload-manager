services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: payload_manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-gpu-data:/var/lib/postgresql/data

  payload-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    restart: unless-stopped
    hostname: payload-manager
    depends_on:
      postgres:
        condition: service_healthy
    command: ["./payload-manager", "--config", "/app/conf/runtime-docker-gpu-postgres.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50051'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ipc: host
    # Required for cross-container CUDA IPC: cuIpcOpenMemHandle resolves the
    # exporting process's PID via procfs; without a shared PID namespace the
    # driver returns CUDA_ERROR_INVALID_CONTEXT even when ipc: host is set.
    pid: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "50056:50051"
    volumes:
      - ../config/runtime-docker-gpu-postgres.yaml:/app/conf/runtime-docker-gpu-postgres.yaml:ro
      - payload-gpu-postgres-data:/var/lib/payload-manager

volumes:
  postgres-gpu-data:
  payload-gpu-postgres-data:
