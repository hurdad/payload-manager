version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/payload-manager/payload-manager/gateway/gen/go
  disable:
    - file_option: go_package
      module: buf.build/googleapis/googleapis
plugins:
  - local: protoc-gen-go
    out: gateway/gen/go
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gateway/gen/go
    opt: paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: gateway/gen/go
    opt: paths=source_relative
  - local: protoc-gen-openapiv2
    out: gateway/openapi
