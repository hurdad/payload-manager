version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/payload-manager/payload-manager/gateway/gen/go
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gateway/gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: gateway/gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc-ecosystem/gateway
    out: gateway/gen/go
    opt:
      - paths=source_relative
      - grpc_api_configuration=gateway/api_config.yaml
  - remote: buf.build/grpc-ecosystem/openapiv2
    out: gateway/openapi
    opt:
      - grpc_api_configuration=gateway/api_config.yaml
      - allow_merge=true
      - merge_file_name=apidocs
